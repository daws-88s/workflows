name: eks-main-pipeline
on:
  workflow_call:
    inputs:
      project:
        required: true
        type: string
      component:
        required: true
        type: string
      language:
        required: true
        type: string          # nodejs | java | python
      deploy_to:
        required: false
        type: string
        default: 'dev'
      version:
        required: false
        type: string
        default: ''
      jira_key:
        required: false
        type: string
        default: ''
      cr_number:
        required: false
        type: string
        default: ''

env:
  ACC_ID: "160885265516"
  REGION: us-east-1
  CLUSTER: roboshop-dev

jobs:
  eks-main-pipeline:
    runs-on: self-hosted
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.REGION }}

    # ── DEV ────────────────────────────────────────────────────────────

    - name: Read version
      if: inputs.deploy_to == 'dev'
      run: |
        case "${{ inputs.language }}" in
          nodejs) APP_VERSION=$(jq -r .version package.json) ;;
          java)   APP_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout) ;;
          python) APP_VERSION=$(cat version.txt) ;;
          *)      echo "::error::Unknown language: ${{ inputs.language }}"; exit 1 ;;
        esac
        SHORT_COMMIT=${GITHUB_SHA::7}
        echo "APP_VERSION=$APP_VERSION"   >> $GITHUB_ENV
        echo "SHORT_COMMIT=$SHORT_COMMIT" >> $GITHUB_ENV

    - name: Login to ECR
      if: inputs.deploy_to == 'dev'
      uses: aws-actions/amazon-ecr-login@v2

    - name: Promote image
      if: inputs.deploy_to == 'dev'
      run: |
        docker pull ${{ env.ACC_ID }}.dkr.ecr.${{ env.REGION }}.amazonaws.com/${{ inputs.project }}/${{ inputs.component }}:${{ env.APP_VERSION }}
        docker tag  ${{ env.ACC_ID }}.dkr.ecr.${{ env.REGION }}.amazonaws.com/${{ inputs.project }}/${{ inputs.component }}:${{ env.APP_VERSION }} \
                    ${{ env.ACC_ID }}.dkr.ecr.${{ env.REGION }}.amazonaws.com/${{ inputs.project }}/${{ inputs.component }}:${{ env.SHORT_COMMIT }}
        docker push ${{ env.ACC_ID }}.dkr.ecr.${{ env.REGION }}.amazonaws.com/${{ inputs.project }}/${{ inputs.component }}:${{ env.SHORT_COMMIT }}

    - name: Deploy to DEV
      if: inputs.deploy_to == 'dev'
      run: |
        aws eks update-kubeconfig --region ${{ env.REGION }} --name ${{ env.CLUSTER }}
        cd helm
        sed -i "s/IMAGE_VERSION/${{ env.SHORT_COMMIT }}/g" values.yaml
        helm upgrade --install ${{ inputs.component }} -f values-dev.yaml -n ${{ inputs.project }}-dev --atomic --wait --timeout=5m .

    # - name: Functional tests
    #   if: inputs.deploy_to == 'dev'
    #   env:
    #     GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    #   run: |
    #     gh workflow run tests.yaml \
    #       --repo ${{ github.repository_owner }}/${{ inputs.component }}-tests \
    #       --ref main

    - name: Login to Jira
      if: inputs.deploy_to == 'dev' || inputs.deploy_to == 'prod'
      uses: atlassian/gajira-login@v3
      env:
        JIRA_BASE_URL: ${{ vars.JIRA_URL }}
        JIRA_USER_EMAIL: ${{ secrets.JIRA_EMAIL }}
        JIRA_API_TOKEN: ${{ secrets.JIRA_TOKEN }}

    - name: Create Jira ticket
      if: inputs.deploy_to == 'dev'
      uses: atlassian/gajira-create@v3
      with:
        project: ${{ vars.JIRA_PROJECT }}
        issuetype: Story
        summary: "${{ inputs.component }} ${{ env.APP_VERSION }} (${{ env.SHORT_COMMIT }}) ready for UAT"
        description: "Component: ${{ inputs.component }} | Version: ${{ env.APP_VERSION }} | Commit: ${{ env.SHORT_COMMIT }}"
        fields: '{"labels": ["${{ env.SHORT_COMMIT }}"]}'

    # ── UAT ────────────────────────────────────────────────────────────

    - name: Checkout version for UAT
      if: inputs.deploy_to == 'uat'
      run: git checkout ${{ inputs.version }}

    - name: Deploy to UAT
      if: inputs.deploy_to == 'uat'
      run: |
        aws eks update-kubeconfig --region ${{ env.REGION }} --name ${{ env.CLUSTER }}
        cd helm
        sed -i "s/IMAGE_VERSION/${{ inputs.version }}/g" values.yaml
        helm upgrade --install ${{ inputs.component }} -f values-uat.yaml -n ${{ inputs.project }}-uat --atomic --wait --timeout=5m .

    # ── PROD ───────────────────────────────────────────────────────────

    - name: Validate change request
      if: inputs.deploy_to == 'prod'
      run: |
        if [ -z "${{ inputs.cr_number }}" ]; then
          echo "::error::CR number is required for PROD deploy."
          exit 1
        fi
        # TODO: replace with real CR tool API call (ServiceNow, Remedy, etc.)
        CR_STATUS="approved"
        IN_WINDOW="true"
        if [ "$CR_STATUS" != "approved" ]; then
          echo "::error::CR ${{ inputs.cr_number }} is not approved."
          exit 1
        fi
        echo "CR ${{ inputs.cr_number }} validated — status: $CR_STATUS"

    - name: Checkout version for PROD
      if: inputs.deploy_to == 'prod'
      run: git checkout ${{ inputs.version }}

    - name: Deploy to PROD
      if: inputs.deploy_to == 'prod'
      run: |
        aws eks update-kubeconfig --region ${{ env.REGION }} --name ${{ env.CLUSTER }}
        cd helm
        sed -i "s/IMAGE_VERSION/${{ inputs.version }}/g" values.yaml
        helm upgrade --install ${{ inputs.component }} -f values-prod.yaml -n ${{ inputs.project }}-prod --atomic --wait --timeout=5m .

    - name: Git tag
      if: inputs.deploy_to == 'prod'
      run: |
        case "${{ inputs.language }}" in
          nodejs) APP_VERSION=$(jq -r .version package.json) ;;
          java)   APP_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout) ;;
          python) APP_VERSION=$(cat version.txt) ;;
        esac
        git config user.email "github-actions@github.com"
        git config user.name "GitHub Actions"
        git tag $APP_VERSION
        git push origin $APP_VERSION

    - name: Transition Jira to Done
      if: inputs.deploy_to == 'prod' && inputs.jira_key != ''
      uses: atlassian/gajira-transition@v3
      with:
        issue: ${{ inputs.jira_key }}
        transition: Done
