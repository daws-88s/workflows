name: feature-java-pipeline
on:
  workflow_call:
    inputs:
      project:
        required: true
        type: string
      component:
        required: true
        type: string

env:
  ACC_ID: "160885265516"
  REGION: us-east-1

jobs:
  feature-java-pipeline:
    runs-on: self-hosted
    permissions:
      statuses: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Read version
      run: |
        APP_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
        echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV

    - name: Install dependencies
      run: mvn dependency:resolve -q

    - name: Unit tests
      id: unit_tests
      run: mvn test -q

    - name: Update status — unit-tests
      if: always()
      uses: .github/actions/update-commit-status@main
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        context: unit-tests
        state: ${{ steps.unit_tests.outcome }}
        description: Unit tests ${{ steps.unit_tests.outcome }}

    # - name: SonarQube scan
    #   id: sonar_scan
    #   uses: SonarSource/sonarqube-scan-action@v6
    #   env:
    #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    #     SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

    # - name: SonarQube quality gate
    #   id: sonar_gate
    #   uses: SonarSource/sonarqube-quality-gate-action@v1
    #   timeout-minutes: 5
    #   env:
    #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    # - name: Update status — sonar-scan
    #   if: always()
    #   uses: .github/actions/update-commit-status@main
    #   with:
    #     token: ${{ secrets.GITHUB_TOKEN }}
    #     context: sonar-scan
    #     state: ${{ steps.sonar_gate.outcome }}
    #     description: SonarQube quality gate ${{ steps.sonar_gate.outcome }}

    - name: Dependabot security check
      id: library_scan
      uses: Posture-Cybersecurity/dependabot-security-checker@v1.1.5
      with:
        github-token: ${{ secrets.DEPENDABOT_TOKEN }}
        severities: 'critical,high'
        fail-on-alerts: 'true'

    - name: Update status — library-scan
      if: always()
      uses: .github/actions/update-commit-status@main
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        context: library-scan
        state: ${{ steps.library_scan.outcome }}
        description: Dependabot security check ${{ steps.library_scan.outcome }}

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.REGION }}

    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Docker image
      run: |
        docker build -t ${{ env.ACC_ID }}.dkr.ecr.${{ env.REGION }}.amazonaws.com/${{ inputs.project }}/${{ inputs.component }}:${{ env.APP_VERSION }} .

    - name: Trivy OS scan
      id: trivy_os
      continue-on-error: true
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.ACC_ID }}.dkr.ecr.${{ env.REGION }}.amazonaws.com/${{ inputs.project }}/${{ inputs.component }}:${{ env.APP_VERSION }}
        scan-type: image
        scanners: vuln
        vuln-type: os
        severity: HIGH,MEDIUM
        exit-code: "1"
        format: table

    - name: Trivy Dockerfile scan
      id: trivy_dockerfile
      continue-on-error: true
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: config
        scan-ref: Dockerfile
        severity: HIGH,MEDIUM
        exit-code: "1"
        format: table


    - name: Push image to ECR
      id: push_image
      run: |
        docker push ${{ env.ACC_ID }}.dkr.ecr.${{ env.REGION }}.amazonaws.com/${{ inputs.project }}/${{ inputs.component }}:${{ env.APP_VERSION }}

    - name: Update status — push-image
      if: always()
      uses: .github/actions/update-commit-status@main
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        context: push-image
        state: ${{ steps.push_image.outcome }}
        description: Push image ${{ steps.push_image.outcome }}

